<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SikaChain app icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#0A7A48"/><stop offset="0.55" stop-color="#006B3F"/><stop offset="1" stop-color="#00482A"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="0.5" cy="0.36" r="0.65">
      <stop offset="0" stop-color="#1B9A63" stop-opacity="0.55"/><stop offset="1" stop-color="#1B9A63" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0.15" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#FFE491"/><stop offset="0.38" stop-color="#F2B705"/>
      <stop offset="0.78" stop-color="#D49A04"/><stop offset="1" stop-color="#B57F02"/>
    </linearGradient>
    <linearGradient id="goldBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF3CF"/><stop offset="0.55" stop-color="#FAC823"/><stop offset="1" stop-color="#E0A300"/>
    </linearGradient>
    <linearGradient id="slit" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0" stop-color="#013F26"/><stop offset="1" stop-color="#00180E"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.36" cy="0.24" r="0.7">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.62"/><stop offset="0.46" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.5"/><stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0"/><stop offset="1" stop-color="#6E5200" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="drop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#00180E" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Squircle background -->
  <rect x="0" y="0" width="512" height="512" rx="114" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="114" fill="url(#bgGlow)"/>

  <!-- Faint kente weave: two thin gold rule lines top and bottom -->
  <g opacity="0.12" stroke="#F2B705" stroke-width="3">
    <line x1="56" y1="60" x2="456" y2="60"/>
    <line x1="56" y1="452" x2="456" y2="452"/>
  </g>

  <!-- Mark centered, scaled. Mark native box ~100; scale 3.4 -> 340, center at (256,256): translate (256-170)=86, y (256-170)=86 -->
  <g transform="translate(86,84) scale(3.4)" filter="url(#drop)">
    <path d="M50 6 C68 6 79 22 80.5 41 C81.8 57 76 79 62 89 C57 92.5 43 92.5 38 89 C24 79 18.2 57 19.5 41 C21 22 32 6 50 6 Z" fill="url(#gold)"/>
    <path d="M50 6 C68 6 79 22 80.5 41 C81.8 57 76 79 62 89 C57 92.5 43 92.5 38 89 C24 79 18.2 57 19.5 41 C21 22 32 6 50 6 Z" fill="none" stroke="url(#rim)" stroke-width="1.5"/>
    <path d="M50 19 Q58.5 34 58.5 51 Q58.5 67 50 81 Q41.5 67 41.5 51 Q41.5 34 50 19 Z" fill="url(#slit)"/>
    <g fill="url(#goldBar)">
      <rect x="45.4" y="22.6" width="9.2"  height="4.5" rx="2.25"/>
      <rect x="43.3" y="30.3" width="13.4" height="4.5" rx="2.25"/>
      <rect x="42.1" y="38.0" width="15.8" height="4.5" rx="2.25"/>
      <rect x="41.6" y="45.7" width="16.8" height="4.5" rx="2.25"/>
      <rect x="41.9" y="53.4" width="16.2" height="4.5" rx="2.25"/>
      <rect x="43.0" y="61.1" width="14.0" height="4.5" rx="2.25"/>
      <rect x="44.8" y="68.8" width="10.4" height="4.5" rx="2.25"/>
    </g>
    <path d="M50 6 C68 6 79 22 80.5 41 C81.8 57 76 79 62 89 C57 92.5 43 92.5 38 89 C24 79 18.2 57 19.5 41 C21 22 32 6 50 6 Z" fill="url(#sheen)"/>
  </g>
</svg>
